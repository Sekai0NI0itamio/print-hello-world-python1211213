name: Build for Apple Silicon (macOS ARM64)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Dependencies
        run: |
          bun install
          bun add modifiers-napi color-diff-napi supports-hyperlinks xss @commander-js/extra-typings color-diff-napi modifiers-napi supports-hyperlinks xss @opentelemetry/sdk-metrics @opentelemetry/sdk-trace-base @opentelemetry/exporter-metrics-otlp-grpc @opentelemetry/exporter-metrics-otlp-http @opentelemetry/exporter-metrics-otlp-proto @opentelemetry/exporter-prometheus @opentelemetry/exporter-logs-otlp-grpc @opentelemetry/exporter-logs-otlp-http @opentelemetry/exporter-logs-otlp-proto @opentelemetry/exporter-trace-otlp-grpc @opentelemetry/exporter-trace-otlp-http @opentelemetry/exporter-trace-otlp-proto

      - name: Bundle into Standalone Executable
        run: |
          bun build ./src/entrypoints/cli.tsx \
            --compile \
            --target=bun-darwin-arm64 \
            --outfile=claude-code

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-code-mac-silicon
          path: claude-code